name: butterflAI
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - ipykernel
  - ipywidgets
  - jupyter_contrib_nbextensions
  - wandb
  - numba
  - numpy
  - scipy
  - matplotlib
  - pandas
  - scikit-learn
  - scikit-image
  - sunpy
  - xarray
  - dask
  - bottleneck
  - h5netcdf
  - hdf5plugin
  - opencv
  - pip
  - pip:
    # CUDA 12.4 build — matches driver on development machines with RTX 4060.
    # Update the --index-url if your CUDA version differs (e.g. cu121, cu126).
    - torch --index-url https://download.pytorch.org/whl/cu124
    - torchvision --index-url https://download.pytorch.org/whl/cu124
    - lightning
    - peft
    - torchmetrics
    - s3fs
    - einops
    - huggingface_hub
    - datasets
    - hf_transfer
    - timm
    - boto3